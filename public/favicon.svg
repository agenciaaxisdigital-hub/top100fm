<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="#0a1f44"/>
  <!-- Red rounded square inner -->
  <rect x="18" y="18" width="476" height="476" rx="88" fill="#c8102e"/>
  <!-- Blue outline ring -->
  <rect x="18" y="18" width="476" height="476" rx="88" fill="none" stroke="#1a3a7a" stroke-width="14"/>

  <!-- TOP text -->
  <text
    x="256"
    y="290"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="210"
    text-anchor="middle"
    fill="white"
    letter-spacing="-8"
  >TOP</text>

  <!-- 100 FM text -->
  <text
    x="256"
    y="390"
    font-family="Arial, sans-serif"
    font-weight="700"
    font-size="88"
    text-anchor="middle"
    fill="#ffd84d"
    letter-spacing="4"
  >100 FM</text>
</svg>
